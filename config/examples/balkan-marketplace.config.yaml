  startCommandText: "Welcome to Marketplace Bot. Send what you need or choose a service below."
  faqCommandText: "Need help with urgent requests, boosts, trusted seller status, or refund options? Write your question here."
  helpCommandText: "*Available commands:* /help /faq /id /miniapp /verifyphone"
  helpCommandStaffText: "*Available commands:*\n    /start - Introduction\n    /faq - FAQ\n    /open - Show open requests\n    /reopen - Reopen a closed request\n    /close - Close a request\n    /clear - Close all requests\n    /ban - Ban a user\n    /leadfee - Show current lead fee\n    /setleadfee 0.50 - Update lead fee\n    /verifyphone - Verify your Telegram phone for marketplace posting\n    /unban - Unban a user"
  confirmationMessage: "Your request was received. A moderator or matching provider will review it shortly."
  blockedSpam: "You have sent too many requests in a short time. Please wait for moderation before sending more."
  ticket: "Request"
  closed: "closed"
  acceptedBy: "was accepted by"
  dear: "Hi"
  regards: "Regards,"
  from: "from"
  language: "language"
  msg_sent: "Message sent to user"
  file_sent: "File sent to user"
  usr_with_ticket: "User with request"
  banned: "banned"
  replyPrivate: "Reply in private"
  services: "Choose a category or simply type what you need, for example: AC repair Brcko, apartment Sarajevo, moving service Novi Sad"
  customer: "customer"
  msgForwarding: "Your message will be routed to the matching team:"
  back: "Go back"
  whatSubCategory: "Which option fits best?"
  prvChatEnded: "Private chat ended."
