# Example configuration for using Telegram Support Bot as the intake layer
# of a Balkan local marketplace and urgent request bot.
#
# This setup covers:
# - keyword-based service routing
# - moderation and manual review
# - FAQ / LLM answers
# - provider or city-specific dispatch groups
#
# It does NOT implement:
# - classifieds storage
# - wallet accounting
# - voucher / PayPal / crypto payment execution
# - automated refunds
#
# Replace all IDs, tokens, and policy details before production use.

bot_token: 'YOUR_BOT_TOKEN'
staffchat_id: '-1000000000000'
staffchat_type: 'telegram'
staffchat_parse_mode: 'MarkdownV2'
owner_id: 'YOUR_TELEGRAM_ID'

spam_cant_msg: 4
spam_time: 600000

parse_mode: 'Markdown'
allow_private: false
direct_reply: false
auto_close_tickets: true
anonymous_tickets: true
anonymous_replies: true
show_auto_replied: true
show_user_ticket: true
autoreply_confirmation: true
clean_replies: false
pass_start: false

signal_enabled: false
web_server: true
web_server_port: 8080
web_app_url: '' # Prefer WEB_APP_URL or PUBLIC_URL in hosting so Mini App buttons use the real deploy URL
marketplace_enabled: true
marketplace_lead_fee: 0.50
marketplace_currency: 'EUR'
marketplace_crypto_refund_fee: 0.03
marketplace_crypto_refund_chain: 'Polygon'
mt_pelerin_url: 'https://widget.mtpelerin.com'
telegram_payment_provider_token: ''
marketplace_request_daily_limit: 5
marketplace_request_expiry_hours: 24
marketplace_voucher_providers:
  - 'X-bon'
  - 'Aircash'
  - 'Voucher'
marketplace_request_categories:
  - 'Stan na dan'
  - 'Tražim pomoć'
  - 'Vodoinstalater'
  - 'Električar'
  - 'Selidba'
  - 'Prevoz'
  - 'Čišćenje'
  - 'Ostalo'
marketplace_cities:
  - 'Beograd'
  - 'Novi Sad'
  - 'Niš'
  - 'Kragujevac'
  - 'Subotica'
  - 'Sarajevo'
  - 'Banja Luka'
  - 'Tuzla'
  - 'Brčko'
  - 'Podgorica'
  - 'Skoplje'
marketplace_listing_categories:
  - 'Auto'
  - 'Nekretnine'
  - 'Razno'
dev_mode: false

